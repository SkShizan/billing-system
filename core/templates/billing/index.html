{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2>Create New Bill</h2>
    </div>
</div>

<div class="card mb-4 shadow-sm">
    <div class="card-header bg-white">
        <h5 class="mb-0">Customer Details</h5>
    </div>
    <div class="card-body row">
        <div class="col-md-6">
            <label class="form-label">Customer Name</label>
            <input type="text" id="custName" class="form-control" placeholder="Enter full name" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Customer Phone (+91)</label>
            <input type="text" id="custPhone" class="form-control" placeholder="10-digit mobile number" required>
        </div>
    </div>
</div>

<div class="card mb-4 shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Cart Items</h5>
        <button class="btn btn-sm btn-primary" onclick="addRow()">+ Add Row</button>
    </div>
    <div class="card-body p-0">
        <div style="overflow: visible;">
            <table class="table table-hover mb-0" id="cartTable">
                <thead class="table-light">
                    <tr>
                        <th width="35%">Product Search</th>
                        <th width="10%">HSN</th>
                        <th width="15%">Price (₹)</th>
                        <th width="10%">GST (%)</th>
                        <th width="10%">Qty</th>
                        <th width="15%">Total (₹)</th>
                        <th width="5%">Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="card shadow-sm mb-5">
    <div class="card-body row text-end">
        <div class="col-md-7"></div>
        <div class="col-md-5">
            <table class="table table-borderless text-end mb-0">
                <tr>
                    <td class="h6 text-muted">Subtotal:</td>
                    <td class="h6">₹<span id="subtotal">0.00</span></td>
                </tr>
                <tr>
                    <td class="align-middle text-muted">Discount:</td>
                    <td>
                        <div class="input-group input-group-sm justify-content-end">
                            <select id="discountType" class="form-select text-end" style="max-width: 100px;" onchange="calculateGrandTotal()">
                                <option value="flat">Flat (₹)</option>
                                <option value="percentage">%</option>
                            </select>
                            <input type="number" id="discountValue" class="form-control text-end" style="max-width: 100px;" value="0" onkeyup="calculateGrandTotal()">
                        </div>
                    </td>
                </tr>
                <tr class="border-bottom">
                    <td class="h6 text-muted">Total Tax (GST):</td>
                    <td class="h6">₹<span id="totalTax">0.00</span></td>
                </tr>
                <tr>
                    <td class="h4 text-success pt-3">Grand Total:</td>
                    <td class="h4 text-success pt-3">₹<span id="grandTotal">0.00</span></td>
                </tr>
            </table>
            <button class="btn btn-success btn-lg w-100 mt-3" id="generateBtn" onclick="generateBill()">Generate Invoice</button>
        </div>
    </div>
</div>

<script>
    // Object to hold independent timers for each row's search bar
    let searchTimers = {};

    // Run this instantly when page loads
    window.onload = function() {
        addRow(); 
    };

    function addRow() {
        const tbody = document.getElementById('cartBody');
        const rowId = Date.now(); 
        
        const tr = document.createElement('tr');
        tr.id = `row-${rowId}`;
        
        // The Select box is replaced by an Input and a Hidden field for the ID
        tr.innerHTML = `
            <td>
                <div class="position-relative">
                    <input type="text" class="form-control border-primary product-search" placeholder="Type to search products..." onkeyup="searchProduct(${rowId}, this)" autocomplete="off">
                    <input type="hidden" class="product-id">
                    <ul class="list-group position-absolute w-100 shadow" id="productSuggestions-${rowId}" style="display: none; z-index: 1050; max-height: 250px; overflow-y: auto;"></ul>
                </div>
            </td>
            <td><input type="text" class="form-control bg-light hsn-input" readonly></td>
            <td><input type="number" class="form-control bg-light price-input" readonly></td>
            <td><input type="text" class="form-control bg-light gst-input" readonly></td>
            <td><input type="number" class="form-control qty-input" value="1" min="1" onkeyup="calculateGrandTotal()" onchange="calculateGrandTotal()"></td>
            <td><input type="text" class="form-control bg-light row-total text-end" readonly value="0.00"></td>
            <td><button class="btn btn-outline-danger btn-sm w-100" tabindex="-1" onclick="removeRow(${rowId})">X</button></td>
        `;
        tbody.appendChild(tr);
    }

    function searchProduct(rowId, inputElem) {
        clearTimeout(searchTimers[rowId]);
        const query = inputElem.value.trim();
        const suggestionBox = document.getElementById(`productSuggestions-${rowId}`);
        const row = document.getElementById(`row-${rowId}`);

        // If user clears the input, clear the data fields
        if (query.length < 2) {
            suggestionBox.style.display = 'none';
            row.querySelector('.product-id').value = '';
            row.querySelector('.hsn-input').value = '';
            row.querySelector('.price-input').value = '';
            row.querySelector('.gst-input').value = '';
            calculateGrandTotal();
            return;
        }

        // Wait 300ms before hitting the API
        searchTimers[rowId] = setTimeout(async () => {
            try {
                const response = await fetch(`/billing/api/products?q=${query}`);
                const products = await response.json();

                suggestionBox.innerHTML = '';

                if (products.length > 0) {
                    products.forEach(p => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item list-group-item-action p-2';
                        li.style.cursor = 'pointer';
                        li.innerHTML = `<strong class="text-primary">${p.name}</strong> <br><small class="text-muted">Price: ₹${p.price} | HSN: ${p.hsn || 'N/A'} | GST: ${p.gst}%</small>`;

                        // Auto-fill logic when an item is clicked
                        li.onclick = () => {
                            inputElem.value = p.name;
                            row.querySelector('.product-id').value = p.id;
                            row.querySelector('.hsn-input').value = p.hsn || '';
                            row.querySelector('.price-input').value = p.price;
                            row.querySelector('.gst-input').value = p.gst + '%';
                            
                            suggestionBox.style.display = 'none';
                            calculateGrandTotal();
                        };
                        suggestionBox.appendChild(li);
                    });
                    suggestionBox.style.display = 'block';
                } else {
                    suggestionBox.innerHTML = '<li class="list-group-item text-muted small">No products found. Add in inventory first.</li>';
                    suggestionBox.style.display = 'block';
                }
            } catch (error) {
                console.error("Error searching products:", error);
            }
        }, 300);
    }

    // Hide all suggestion dropdowns if the user clicks outside
    document.addEventListener('click', function(event) {
        if (!event.target.closest('.position-relative')) {
            document.querySelectorAll('[id^="productSuggestions-"]').forEach(box => {
                box.style.display = 'none';
            });
        }
    });

    function removeRow(rowId) {
        const tbody = document.getElementById('cartBody');
        if (tbody.children.length > 1) {
            document.getElementById(`row-${rowId}`).remove();
            calculateGrandTotal();
        } else {
            alert("You must have at least one row in the cart.");
        }
    }

    function calculateGrandTotal() {
        let subtotal = 0;
        let totalTax = 0;

        document.querySelectorAll('#cartBody tr').forEach(row => {
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const qty = parseInt(row.querySelector('.qty-input').value) || 0;
            const gst = parseFloat(row.querySelector('.gst-input').value.replace('%', '')) || 0;

            const rowBaseTotal = price * qty;
            const rowTax = rowBaseTotal * (gst / 100);
            
            row.querySelector('.row-total').value = (rowBaseTotal + rowTax).toFixed(2);
            
            subtotal += rowBaseTotal;
            totalTax += rowTax;
        });

        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('totalTax').innerText = totalTax.toFixed(2);

        const discountType = document.getElementById('discountType').value;
        const discountValue = parseFloat(document.getElementById('discountValue').value) || 0;
        let discountAmount = 0;

        if (discountType === 'flat') {
            discountAmount = discountValue;
        } else {
            discountAmount = subtotal * (discountValue / 100);
        }

        const grandTotal = (subtotal - discountAmount) + totalTax;
        document.getElementById('grandTotal').innerText = grandTotal > 0 ? grandTotal.toFixed(2) : "0.00";
    }

    async function generateBill() {
        const btn = document.getElementById('generateBtn');
        const items = [];
        
        document.querySelectorAll('#cartBody tr').forEach(row => {
            // Read from the hidden ID field instead of a select box
            const productId = row.querySelector('.product-id').value;
            const qty = row.querySelector('.qty-input').value;
            if(productId && qty > 0) {
                items.push({ product_id: parseInt(productId), quantity: parseInt(qty) });
            }
        });

        if(items.length === 0) return alert("Please select at least one valid product from the suggestions.");
        
        const custName = document.getElementById('custName').value.trim();
        const custPhone = document.getElementById('custPhone').value.trim();
        
        if(!custName || !custPhone) return alert("Please fill in both Customer Name and Phone Number.");

        btn.disabled = true;
        btn.innerText = "Generating...";

        const payload = {
            customer_name: custName,
            customer_phone: custPhone,
            subtotal: parseFloat(document.getElementById('subtotal').innerText),
            total_tax: parseFloat(document.getElementById('totalTax').innerText),
            discount_type: document.getElementById('discountType').value,
            discount_value: parseFloat(document.getElementById('discountValue').value) || 0,
            grand_total: parseFloat(document.getElementById('grandTotal').innerText),
            items: items
        };

        try {
            const response = await fetch('/billing/api/generate_bill', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if(result.success) {
                window.location.href = `/billing/invoice/${result.invoice_id}`;
            } else {
                alert("Failed to generate bill.");
                btn.disabled = false;
                btn.innerText = "Generate Invoice";
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Network error occurred.");
            btn.disabled = false;
            btn.innerText = "Generate Invoice";
        }
    }
</script>
{% endblock %}
