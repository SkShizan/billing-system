{% extends "base.html" %}

{% block content %}
<style>
    .pos-title { color: var(--color-sage); font-weight: 700; letter-spacing: -0.5px; }
    .pos-label { font-weight: 600; color: var(--color-taupe); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-control { border: 1px solid var(--color-sand); border-radius: 8px; transition: all 0.2s; }
    .form-control:focus { border-color: var(--color-sage); box-shadow: 0 0 0 3px rgba(102, 121, 107, 0.15); }
    .table-pos th { background-color: #F8F5F1; color: var(--color-sage); border-bottom: 2px solid var(--color-sand); font-size: 0.85rem; text-transform: uppercase; padding: 1rem; }
    .table-pos td { padding: 0.75rem 1rem; vertical-align: middle; border-bottom: 1px solid rgba(212, 194, 173, 0.3); }
    .checkout-pane { background-color: rgba(239, 223, 204, 0.3); border-radius: 16px; border: 1px solid var(--color-sand); }
</style>

<div class="row mb-4 mt-2">
    <div class="col d-flex align-items-center">
        <span class="fs-3 me-2 text-terracotta">🛒</span>
        <h2 class="pos-title mb-0">Point of Sale</h2>
    </div>
</div>

<div class="card card-glass border-0 mb-4">
    <div class="card-header bg-white border-0 pt-4 pb-0 px-4 rounded-top-4">
        <h6 class="pos-label mb-0">Customer Details</h6>
    </div>
    <div class="card-body px-4 pb-4">
        <div class="row">
            <div class="col-md-6 mb-2">
                <input type="text" id="custName" class="form-control py-2" placeholder="Full Name" required>
            </div>
            <div class="col-md-6 mb-2">
                <input type="text" id="custPhone" class="form-control py-2" placeholder="Phone Number (+91)" required>
            </div>
        </div>
    </div>
</div>

<div class="card card-glass border-0 mb-4">
    <div class="card-header bg-white border-0 pt-4 pb-3 px-4 d-flex justify-content-between align-items-center rounded-top-4">
        <h6 class="pos-label mb-0">Cart Items</h6>
        <button class="btn btn-terracotta btn-sm px-3" onclick="addRow()">+ Add Product Row</button>
    </div>
    <div class="card-body p-0">
        <div style="overflow: visible;">
            <table class="table table-pos mb-0" id="cartTable">
                <thead>
                    <tr>
                        <th width="35%" class="ps-4">Product Search</th>
                        <th width="10%">HSN</th>
                        <th width="15%">Price (₹)</th>
                        <th width="10%">GST (%)</th>
                        <th width="10%">Qty</th>
                        <th width="15%">Total (₹)</th>
                        <th width="5%" class="pe-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="row mb-5 justify-content-end">
    <div class="col-md-5">
        <div class="checkout-pane p-4 shadow-sm">
            <table class="table table-borderless text-end mb-0">
                <tr>
                    <td class="h6 text-muted fw-medium">Subtotal:</td>
                    <td class="h6 fw-bold text-dark">₹<span id="subtotal">0.00</span></td>
                </tr>
                <tr>
                    <td class="align-middle text-muted fw-medium">Discount:</td>
                    <td>
                        <div class="input-group input-group-sm justify-content-end">
                            <select id="discountType" class="form-select text-end" style="max-width: 80px; border-color: var(--color-sand);" onchange="calculateGrandTotal()">
                                <option value="flat">₹</option>
                                <option value="percentage">%</option>
                            </select>
                            <input type="number" id="discountValue" class="form-control text-end" style="max-width: 90px; border-color: var(--color-sand);" value="0" onkeyup="calculateGrandTotal()">
                        </div>
                    </td>
                </tr>
                <tr class="border-bottom" style="border-color: var(--color-sand) !important;">
                    <td class="h6 text-muted fw-medium pb-3">Total Tax (GST):</td>
                    <td class="h6 fw-bold text-dark pb-3">₹<span id="totalTax">0.00</span></td>
                </tr>
                <tr>
                    <td class="h3 text-sage fw-bold pt-3">Grand Total:</td>
                    <td class="h3 text-sage fw-bold pt-3">₹<span id="grandTotal">0.00</span></td>
                </tr>
            </table>
            <button class="btn btn-sage btn-lg w-100 mt-4 shadow-sm fw-bold" id="generateBtn" onclick="generateBill()">Generate Invoice</button>
        </div>
    </div>
</div>

<script>
    let searchTimers = {};
    window.onload = function() { addRow(); };

    function addRow() {
        const tbody = document.getElementById('cartBody');
        const rowId = Date.now(); 
        
        const tr = document.createElement('tr');
        tr.id = `row-${rowId}`;
        
        // Updated HTML inside JS to match the custom styling
        tr.innerHTML = `
            <td class="ps-4">
                <div class="position-relative">
                    <input type="text" class="form-control" style="border-color: var(--color-terracotta);" placeholder="Type product name..." onkeyup="searchProduct(${rowId}, this)" autocomplete="off">
                    <input type="hidden" class="product-id">
                    <ul class="list-group position-absolute w-100 shadow-lg border-0" id="productSuggestions-${rowId}" style="display: none; z-index: 1050; max-height: 250px; overflow-y: auto; border-radius: 8px;"></ul>
                </div>
            </td>
            <td><input type="text" class="form-control bg-light text-muted border-0 hsn-input" readonly></td>
            <td><input type="number" class="form-control bg-light text-muted border-0 price-input" readonly></td>
            <td><input type="text" class="form-control bg-light text-muted border-0 gst-input" readonly></td>
            <td><input type="number" class="form-control qty-input border-0" style="background-color: #ffffff; box-shadow: inset 0 0 0 1px var(--color-sand);" value="1" min="1" onkeyup="calculateGrandTotal()" onchange="calculateGrandTotal()"></td>
            <td><input type="text" class="form-control bg-light text-dark fw-bold border-0 row-total text-end" readonly value="0.00"></td>
            <td class="pe-4 text-center"><button class="btn btn-sm text-danger fw-bold border-0 bg-transparent" tabindex="-1" onclick="removeRow(${rowId})">✕</button></td>
        `;
        tbody.appendChild(tr);
    }

    function searchProduct(rowId, inputElem) {
        clearTimeout(searchTimers[rowId]);
        const query = inputElem.value.trim();
        const suggestionBox = document.getElementById(`productSuggestions-${rowId}`);
        const row = document.getElementById(`row-${rowId}`);

        if (query.length < 2) {
            suggestionBox.style.display = 'none';
            row.querySelector('.product-id').value = '';
            row.querySelector('.hsn-input').value = '';
            row.querySelector('.price-input').value = '';
            row.querySelector('.gst-input').value = '';
            calculateGrandTotal();
            return;
        }

        searchTimers[rowId] = setTimeout(async () => {
            try {
                const response = await fetch(`/billing/api/products?q=${query}`);
                const products = await response.json();
                suggestionBox.innerHTML = '';

                if (products.length > 0) {
                    products.forEach(p => {
                        const li = document.createElement('li');
                        // Custom styled list items
                        li.className = 'list-group-item list-group-item-action p-3 border-bottom';
                        li.style.cursor = 'pointer';
                        li.style.borderColor = 'var(--color-sand)';
                        li.innerHTML = `<strong style="color: var(--color-sage);">${p.name}</strong> <br><small class="text-muted fw-medium">Price: ₹${p.price} • HSN: ${p.hsn || 'N/A'} • GST: ${p.gst}%</small>`;

                        li.onclick = () => {
                            inputElem.value = p.name;
                            row.querySelector('.product-id').value = p.id;
                            row.querySelector('.hsn-input').value = p.hsn || '';
                            row.querySelector('.price-input').value = p.price;
                            row.querySelector('.gst-input').value = p.gst + '%';
                            suggestionBox.style.display = 'none';
                            calculateGrandTotal();
                        };
                        suggestionBox.appendChild(li);
                    });
                    suggestionBox.style.display = 'block';
                } else {
                    suggestionBox.innerHTML = '<li class="list-group-item text-muted small p-3">No products found. Add in inventory first.</li>';
                    suggestionBox.style.display = 'block';
                }
            } catch (error) { console.error("Error:", error); }
        }, 300);
    }

    document.addEventListener('click', function(event) {
        if (!event.target.closest('.position-relative')) {
            document.querySelectorAll('[id^="productSuggestions-"]').forEach(box => { box.style.display = 'none'; });
        }
    });

    function removeRow(rowId) {
        const tbody = document.getElementById('cartBody');
        if (tbody.children.length > 1) {
            document.getElementById(`row-${rowId}`).remove();
            calculateGrandTotal();
        } else {
            alert("You must have at least one row in the cart.");
        }
    }

    function calculateGrandTotal() {
        let subtotal = 0; let totalTax = 0;
        document.querySelectorAll('#cartBody tr').forEach(row => {
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const qty = parseInt(row.querySelector('.qty-input').value) || 0;
            const gst = parseFloat(row.querySelector('.gst-input').value.replace('%', '')) || 0;

            const rowBaseTotal = price * qty;
            const rowTax = rowBaseTotal * (gst / 100);
            row.querySelector('.row-total').value = (rowBaseTotal + rowTax).toFixed(2);
            subtotal += rowBaseTotal; totalTax += rowTax;
        });

        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('totalTax').innerText = totalTax.toFixed(2);

        const discountType = document.getElementById('discountType').value;
        const discountValue = parseFloat(document.getElementById('discountValue').value) || 0;
        let discountAmount = 0;

        if (discountType === 'flat') discountAmount = discountValue;
        else discountAmount = subtotal * (discountValue / 100);

        const grandTotal = (subtotal - discountAmount) + totalTax;
        document.getElementById('grandTotal').innerText = grandTotal > 0 ? grandTotal.toFixed(2) : "0.00";
    }

    async function generateBill() {
        const btn = document.getElementById('generateBtn');
        const items = [];
        document.querySelectorAll('#cartBody tr').forEach(row => {
            const productId = row.querySelector('.product-id').value;
            const qty = row.querySelector('.qty-input').value;
            if(productId && qty > 0) items.push({ product_id: parseInt(productId), quantity: parseInt(qty) });
        });

        if(items.length === 0) return alert("Please select valid products.");
        const custName = document.getElementById('custName').value.trim();
        const custPhone = document.getElementById('custPhone').value.trim();
        if(!custName || !custPhone) return alert("Customer Name and Phone required.");

        btn.disabled = true; btn.innerText = "Generating...";

        const payload = {
            customer_name: custName, customer_phone: custPhone,
            subtotal: parseFloat(document.getElementById('subtotal').innerText),
            total_tax: parseFloat(document.getElementById('totalTax').innerText),
            discount_type: document.getElementById('discountType').value,
            discount_value: parseFloat(document.getElementById('discountValue').value) || 0,
            grand_total: parseFloat(document.getElementById('grandTotal').innerText),
            items: items
        };

        try {
            const response = await fetch('/billing/api/generate_bill', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const result = await response.json();
            if(result.success) window.location.href = `/billing/invoice/${result.invoice_id}`;
            else { alert("Failed."); btn.disabled = false; btn.innerText = "Generate Invoice"; }
        } catch (error) {
            console.error(error); alert("Network error."); btn.disabled = false; btn.innerText = "Generate Invoice";
        }
    }
</script>
{% endblock %}
